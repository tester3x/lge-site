<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Gold Energy</title>
    <link rel="icon" type="image/png" href="LGE_final.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@300;400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(1px 1px at 10% 20%, rgba(255, 215, 0, 0.4), transparent),
                radial-gradient(1px 1px at 20% 50%, rgba(255, 215, 0, 0.3), transparent),
                radial-gradient(1px 1px at 30% 70%, rgba(255, 215, 0, 0.2), transparent),
                radial-gradient(1px 1px at 40% 30%, rgba(255, 215, 0, 0.4), transparent),
                radial-gradient(1px 1px at 50% 80%, rgba(255, 215, 0, 0.3), transparent),
                radial-gradient(1px 1px at 60% 10%, rgba(255, 215, 0, 0.2), transparent),
                radial-gradient(1px 1px at 70% 60%, rgba(255, 215, 0, 0.4), transparent),
                radial-gradient(1px 1px at 80% 40%, rgba(255, 215, 0, 0.3), transparent),
                radial-gradient(1px 1px at 90% 90%, rgba(255, 215, 0, 0.2), transparent),
                radial-gradient(1px 1px at 15% 85%, rgba(255, 215, 0, 0.3), transparent),
                radial-gradient(1px 1px at 25% 15%, rgba(255, 215, 0, 0.4), transparent),
                radial-gradient(1px 1px at 35% 45%, rgba(255, 215, 0, 0.2), transparent),
                radial-gradient(1px 1px at 45% 75%, rgba(255, 215, 0, 0.3), transparent),
                radial-gradient(1px 1px at 55% 25%, rgba(255, 215, 0, 0.4), transparent),
                radial-gradient(1px 1px at 65% 55%, rgba(255, 215, 0, 0.2), transparent),
                radial-gradient(1px 1px at 75% 5%, rgba(255, 215, 0, 0.3), transparent),
                radial-gradient(1px 1px at 85% 65%, rgba(255, 215, 0, 0.4), transparent),
                radial-gradient(1px 1px at 95% 35%, rgba(255, 215, 0, 0.2), transparent),
                radial-gradient(1px 1px at 5% 55%, rgba(255, 215, 0, 0.3), transparent),
                radial-gradient(1px 1px at 50% 50%, rgba(255, 215, 0, 0.1), transparent);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        .can-wrapper {
            position: relative;
            margin-bottom: 40px;
        }

        .can-wrapper::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 40px;
            background: radial-gradient(ellipse, rgba(0, 100, 255, 0.3) 0%, transparent 70%);
            filter: blur(10px);
        }

        .can-image {
            max-height: 650px;
            width: auto;
            filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.15));
            animation: float 4s ease-in-out infinite;
            mask-image: radial-gradient(ellipse 85% 80% at center, black 50%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 85% 80% at center, black 50%, transparent 100%);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .brand-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: clamp(28px, 5vw, 48px);
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #FFD700 0%, #B8960C 50%, #FFD700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            text-align: center;
        }

        .tagline {
            font-weight: 300;
            font-size: clamp(14px, 2vw, 18px);
            letter-spacing: 8px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
            text-align: center;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #FFD700, transparent);
            margin-bottom: 40px;
        }

        .socials {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .socials a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .socials a:hover {
            color: #FFD700;
        }

        .socials span {
            color: rgba(255, 255, 255, 0.15);
            font-size: 10px;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: radial-gradient(ellipse at center bottom, rgba(0, 50, 255, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        @media (max-width: 600px) {
            .can-image {
                max-height: 420px;
            }

            .socials {
                gap: 16px;
            }

            .socials a {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="can-wrapper">
            <img src="LGE_final.png" alt="Liquid Gold Energy - Midnight Reserve" class="can-image">
        </div>
        <div class="brand-name">Liquid Gold Energy</div>
        <div class="tagline">Coming Soon</div>
        <div class="divider"></div>
        <div class="socials">
            <a href="https://instagram.com/drink_lge" target="_blank">Instagram</a>
            <span>|</span>
            <a href="https://x.com/drinklge" target="_blank">X</a>
        </div>
    </div>
</body>
</html>
